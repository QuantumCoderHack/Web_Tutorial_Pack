<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraphs</title>
</head>
<body>
   
    <!-- paragraph tag <p></p> -->
<p>
    This is normal text.
</p>

<!-- space -->
<br>

<p>
    <!-- font types -->
    <i>italic</i>
    <br>
    <b>bold</b>
    <br>
    <strong>strong</strong>
    <br>
    <u>underline</u>
    <br>
    <mark>mark</mark>
</p>

<!-- line -->
<hr>

<!-- space -->
<br>

<p>Ex:
    <br>
    <mark>
        <u>
            <i>
                <b>
                    Html5
                </b>
            </i>
        </u>
    </mark>
    <mark>
        <u>
            <i>
                Css
            </i>
        </u>
    </mark>
    <mark>
        <u>
            <i>
                Js
            </i>
        </u>
    </mark>
</p>


</body>
</html>
