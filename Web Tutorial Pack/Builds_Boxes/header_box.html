<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Box</title>
    <style>
        header{
            width: auto; /* width: 100%;  */
            height: 100px;
            background-color: rgb(15, 15, 15);
            /* Text Color */
            color: white;

            /* Object: Flex */
            display: flex;

            /* Horizontal align */
            align-items: center;
        
            /* Vertical align */
            justify-content: flex-start;

            /*space inbox*/
            padding: 10px;
        }
        h3{
            color: rgb(0, 153, 255);
        }
    </style>
</head>
<body>
<!-- Generally  it uses for title links and top bar . -->
    <header>
            <h3><u>Main Page </u> 
                <hr>
                <u>About</u>
                <hr>
                <u>More...</u>
            </h3> 
    </header>

</body>
</html>
