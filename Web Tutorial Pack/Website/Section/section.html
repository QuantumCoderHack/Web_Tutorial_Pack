<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section</title>
    <style>
        body,html{
            height: 100vh;
            display: flex;
        }
    </style>
</head>
<body>
    
    <section style="background-color: rgb(227, 216, 15); width:max-content; height: 100vh; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);">
        <h2>Section Title</h2>
        
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
            <ol type="a">
                <li>Subitem 1</li>
                <li>Subitem 2</li>
                <li>Subitem 3</li>
            </ol>
            
        </ul>
    </section>


</body>
</html>
