<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aside</title>
    <style>
        aside {
            background-color: #f0f0f0;
            padding: 20px;
            border: 1px solid #ccc;
            width: 300px;
            margin: 20px auto;
            border-radius: 5px;
        }
        h2 {
            margin-top: 0;
        }



    </style>
</head>
<body>
    <aside>
        <h2>Sidebar</h2>
        <p>This is an aside element, which is typically used for content that is tangentially related to the main content of the page. It can contain additional information, links, or advertisements.</p>
        <hr>

    </aside>
</body>
</html>
